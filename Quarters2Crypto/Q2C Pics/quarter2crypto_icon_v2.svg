<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Deep space gradient -->
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#1a0b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0118;stop-opacity:1" />
    </radialGradient>
    
    <!-- Photorealistic Earth gradients -->
    <radialGradient id="oceanGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#4da6ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#003d7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a33;stop-opacity:1" />
    </radialGradient>
    
    <!-- Land gradient -->
    <radialGradient id="landGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#90c890;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#5a9e5a;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2d5f2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3d1a;stop-opacity:1" />
    </radialGradient>
    
    <!-- Desert/mountain gradient -->
    <radialGradient id="desertGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b8860b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6914;stop-opacity:1" />
    </radialGradient>
    
    <!-- Ice gradient -->
    <radialGradient id="iceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8dce8;stop-opacity:1" />
    </radialGradient>
    
    <!-- Intense energy burst gradient -->
    <radialGradient id="energyBurst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="15%" style="stop-color:#fef08a;stop-opacity:0.9" />
      <stop offset="30%" style="stop-color:#fbbf24;stop-opacity:0.7" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:0.5" />
      <stop offset="70%" style="stop-color:#d97706;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:0" />
    </radialGradient>
    
    <!-- Secondary energy wave -->
    <radialGradient id="energyWave2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef08a;stop-opacity:0.8" />
      <stop offset="30%" style="stop-color:#fbbf24;stop-opacity:0.6" />
      <stop offset="60%" style="stop-color:#f59e0b;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0" />
    </radialGradient>
    
    <!-- Consciousness field gradient -->
    <radialGradient id="consciousnessField" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.6" />
      <stop offset="40%" style="stop-color:#7c3aed;stop-opacity:0.4" />
      <stop offset="70%" style="stop-color:#6366f1;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0" />
    </radialGradient>
    
    <!-- Metatron's Cube glow -->
    <linearGradient id="cubeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6ec7;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.5" />
    </linearGradient>
    
    <!-- Intense glow filter -->
    <filter id="intenseGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Energy glow -->
    <filter id="energyGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Soft glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Clip path for dodecahedron boundary -->
  <clipPath id="dodecaClip">
    <!-- Regular dodecahedron projection (12 pentagonal faces) -->
    <path d="M 250,20 
             L 375,90 
             L 420,210 
             L 375,350 
             L 285,430 
             L 215,430 
             L 125,350 
             L 80,210 
             L 125,90 
             Z"/>
  </clipPath>
  
  <!-- Main container with dodecahedron clip -->
  <g clip-path="url(#dodecaClip)">
    <!-- Deep space background -->
    <rect width="500" height="500" fill="url(#spaceGrad)"/>
    
    <!-- Distant stars -->
    <circle cx="100" cy="80" r="1.2" fill="#ffffff" opacity="0.9"/>
    <circle cx="380" cy="120" r="1" fill="#ffffff" opacity="0.8"/>
    <circle cx="150" cy="350" r="1.3" fill="#ffffff" opacity="0.7"/>
    <circle cx="340" cy="380" r="1.1" fill="#ffffff" opacity="0.8"/>
    <circle cx="180" cy="150" r="0.8" fill="#a855f7" opacity="0.9"/>
    <circle cx="320" cy="200" r="0.9" fill="#ff6ec7" opacity="0.8"/>
    <circle cx="120" cy="280" r="0.7" fill="#6366f1" opacity="0.7"/>
    <circle cx="360" cy="300" r="1" fill="#06b6d4" opacity="0.9"/>
    
    <!-- Center point -->
    <g transform="translate(250, 250)">
      
      <!-- Outermost consciousness wave -->
      <circle cx="0" cy="0" r="200" fill="url(#consciousnessField)" opacity="0.3" filter="url(#energyGlow)"/>
      <circle cx="0" cy="0" r="170" fill="url(#consciousnessField)" opacity="0.4" filter="url(#energyGlow)"/>
      
      <!-- Energy burst waves - multiple layers for intensity -->
      <circle cx="0" cy="0" r="150" fill="url(#energyBurst)" opacity="0.6" filter="url(#intenseGlow)"/>
      <circle cx="0" cy="0" r="130" fill="url(#energyWave2)" opacity="0.7" filter="url(#intenseGlow)"/>
      <circle cx="0" cy="0" r="110" fill="url(#energyBurst)" opacity="0.8" filter="url(#intenseGlow)"/>
      <circle cx="0" cy="0" r="90" fill="url(#energyWave2)" opacity="0.9" filter="url(#intenseGlow)"/>
      
      <!-- Radiating energy rays -->
      <g stroke="#fbbf24" stroke-width="3" opacity="0.6" filter="url(#energyGlow)">
        <line x1="0" y1="0" x2="0" y2="-180" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="156" y2="-90" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="156" y2="90" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="0" y2="180" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="-156" y2="90" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="-156" y2="-90" stroke-linecap="round"/>
      </g>
      
      <!-- Secondary rays -->
      <g stroke="#fef08a" stroke-width="2" opacity="0.5" filter="url(#energyGlow)">
        <line x1="0" y1="0" x2="127" y2="-127" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="180" y2="0" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="127" y2="127" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="-127" y2="127" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="-180" y2="0" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="-127" y2="-127" stroke-linecap="round"/>
      </g>
      
      <!-- Energy particles radiating outward -->
      <g fill="#fbbf24" opacity="0.8" filter="url(#softGlow)">
        <circle cx="0" cy="-140" r="3"/>
        <circle cx="121" cy="-70" r="2.5"/>
        <circle cx="121" cy="70" r="3"/>
        <circle cx="0" cy="140" r="2.5"/>
        <circle cx="-121" cy="70" r="3"/>
        <circle cx="-121" cy="-70" r="2.5"/>
        <circle cx="99" cy="-99" r="2"/>
        <circle cx="140" cy="0" r="2.5"/>
        <circle cx="99" cy="99" r="2"/>
        <circle cx="-99" cy="99" r="2.5"/>
        <circle cx="-140" cy="0" r="2"/>
        <circle cx="-99" cy="-99" r="2.5"/>
      </g>
      
      <!-- Metatron's Cube - simplified, integrated -->
      <g stroke="url(#cubeGlow)" stroke-width="2" fill="none" opacity="0.6" filter="url(#softGlow)">
        <!-- Outer hexagon -->
        <path d="M 0,-80 L 69,-40 L 69,40 L 0,80 L -69,40 L -69,-40 Z"/>
        <!-- Inner hexagon -->
        <path d="M 0,-50 L 43,-25 L 43,25 L 0,50 L -43,25 L -43,-25 Z"/>
        <!-- Connecting sacred geometry -->
        <line x1="0" y1="-80" x2="0" y2="80"/>
        <line x1="69" y1="-40" x2="-69" y2="40"/>
        <line x1="69" y1="40" x2="-69" y2="-40"/>
      </g>
      
      <!-- Photorealistic Earth -->
      <g filter="url(#softGlow)">
        <!-- Base ocean sphere -->
        <circle cx="0" cy="0" r="60" fill="url(#oceanGrad)"/>
        
        <!-- Continents - more detailed, recognizable shapes -->
        <!-- North America -->
        <path d="M -15,-30 Q -25,-25 -28,-18 L -26,-10 Q -22,-8 -18,-10 L -15,-5 Q -8,-8 -5,-15 Q -2,-20 -5,-25 Z" 
              fill="url(#landGrad)" opacity="0.9"/>
        
        <!-- South America -->
        <path d="M -10,5 Q -15,8 -15,15 L -12,25 Q -8,30 -5,28 L -2,20 Q 0,15 -2,10 Z" 
              fill="url(#landGrad)" opacity="0.9"/>
        
        <!-- Africa -->
        <path d="M 5,-15 Q 12,-18 18,-15 L 22,-8 Q 25,0 25,10 L 22,20 Q 18,25 12,25 L 8,20 Q 5,12 5,5 Z" 
              fill="url(#landGrad)" opacity="0.9"/>
        
        <!-- Europe -->
        <path d="M 8,-22 Q 15,-25 20,-22 L 18,-18 Q 12,-20 10,-18 Z" 
              fill="url(#landGrad)" opacity="0.9"/>
        
        <!-- Asia -->
        <path d="M 25,-20 Q 35,-18 42,-12 L 45,-5 Q 48,5 45,12 L 38,15 Q 32,12 28,8 L 25,0 Z" 
              fill="url(#landGrad)" opacity="0.9"/>
        
        <!-- Australia -->
        <path d="M 35,18 Q 42,18 45,22 L 43,28 Q 38,30 33,28 L 32,22 Z" 
              fill="url(#desertGrad)" opacity="0.9"/>
        
        <!-- Greenland -->
        <path d="M -8,-35 Q -5,-38 0,-36 L 2,-32 Q 0,-30 -5,-32 Z" 
              fill="url(#iceGrad)" opacity="0.95"/>
        
        <!-- Antarctica (bottom) -->
        <ellipse cx="0" cy="50" rx="45" ry="12" fill="url(#iceGrad)" opacity="0.95"/>
        
        <!-- Arctic ice cap -->
        <ellipse cx="0" cy="-52" rx="25" ry="10" fill="url(#iceGrad)" opacity="0.9"/>
        
        <!-- Cloud formations -->
        <g fill="#ffffff" opacity="0.25">
          <ellipse cx="-25" cy="-8" rx="10" ry="5" transform="rotate(-15 -25 -8)"/>
          <ellipse cx="18" cy="15" rx="12" ry="6" transform="rotate(20 18 15)"/>
          <ellipse cx="-5" cy="25" rx="8" ry="4"/>
          <ellipse cx="30" cy="-15" rx="9" ry="5" transform="rotate(-25 30 -15)"/>
          <ellipse cx="-35" cy="10" rx="7" ry="4"/>
        </g>
        
        <!-- Sunlight highlight on Earth -->
        <ellipse cx="-15" cy="-18" rx="18" ry="15" fill="#ffffff" opacity="0.15"/>
        
        <!-- Atmospheric layers -->
        <circle cx="0" cy="0" r="61" fill="none" stroke="#4da6ff" stroke-width="1" opacity="0.3"/>
        <circle cx="0" cy="0" r="62.5" fill="none" stroke="#87ceeb" stroke-width="1.5" opacity="0.2"/>
        <circle cx="0" cy="0" r="64" fill="none" stroke="#a8daff" stroke-width="0.8" opacity="0.15"/>
        
        <!-- Terminator line (day/night) -->
        <ellipse cx="10" cy="0" rx="3" ry="60" fill="#000000" opacity="0.15"/>
      </g>
      
      <!-- Inner energy corona directly around Earth -->
      <circle cx="0" cy="0" r="72" fill="none" stroke="#fef08a" stroke-width="2" opacity="0.7" filter="url(#intenseGlow)"/>
      <circle cx="0" cy="0" r="68" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6" filter="url(#intenseGlow)"/>
      
      <!-- Bright center point - source of all energy -->
      <circle cx="0" cy="0" r="8" fill="#ffffff" opacity="0.8" filter="url(#intenseGlow)"/>
      <circle cx="0" cy="0" r="4" fill="#fef08a" filter="url(#intenseGlow)"/>
      
    </g>
  </g>
  
  <!-- Dodecahedron boundary outline -->
  <path d="M 250,20 
           L 375,90 
           L 420,210 
           L 375,350 
           L 285,430 
           L 215,430 
           L 125,350 
           L 80,210 
           L 125,90 
           Z" 
        fill="none" 
        stroke="url(#cubeGlow)" 
        stroke-width="3" 
        opacity="0.7"
        filter="url(#softGlow)"/>
  
  <!-- Additional dodecahedron edges for 3D effect -->
  <g stroke="url(#cubeGlow)" stroke-width="1.5" opacity="0.4" fill="none">
    <line x1="250" y1="20" x2="250" y2="250"/>
    <line x1="375" y1="90" x2="250" y2="250"/>
    <line x1="420" y1="210" x2="250" y2="250"/>
    <line x1="375" y1="350" x2="250" y2="250"/>
    <line x1="285" y1="430" x2="250" y2="250"/>
    <line x1="215" y1="430" x2="250" y2="250"/>
    <line x1="125" y1="350" x2="250" y2="250"/>
    <line x1="80" y1="210" x2="250" y2="250"/>
    <line x1="125" y1="90" x2="250" y2="250"/>
  </g>
</svg>