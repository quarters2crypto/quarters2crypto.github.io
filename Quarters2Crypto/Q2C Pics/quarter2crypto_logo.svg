<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- Cosmic gradient background -->
    <linearGradient id="cosmicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0b2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f051d;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glowing gradient for Metatron's Cube -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6ec7;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#a855f7;stop-opacity:0.7" />
      <stop offset="70%" style="stop-color:#6366f1;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.3" />
    </radialGradient>
    
    <!-- Inner glow -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0" />
    </radialGradient>
    
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6ec7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Strong glow filter -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="300" fill="url(#cosmicGrad)"/>
  
  <!-- Stars -->
  <circle cx="100" cy="50" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="150" cy="80" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="700" cy="60" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="650" cy="100" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="750" cy="200" r="1.2" fill="#ffffff" opacity="0.8"/>
  <circle cx="80" cy="220" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="720" cy="250" r="1.3" fill="#ffffff" opacity="0.7"/>
  <circle cx="200" cy="40" r="0.8" fill="#a855f7" opacity="0.9"/>
  <circle cx="600" cy="70" r="0.8" fill="#ff6ec7" opacity="0.8"/>
  <circle cx="130" cy="180" r="0.9" fill="#6366f1" opacity="0.7"/>
  
  <!-- Metatron's Cube centered on left side -->
  <g transform="translate(150, 150)" filter="url(#strongGlow)">
    <!-- Outer glow circle -->
    <circle cx="0" cy="0" r="85" fill="url(#glowGrad)" opacity="0.3"/>
    <circle cx="0" cy="0" r="70" fill="url(#innerGlow)" opacity="0.4"/>
    
    <!-- Metatron's Cube structure -->
    <!-- Outer circle points -->
    <g stroke="url(#glowGrad)" stroke-width="2" fill="none" opacity="0.9">
      <!-- 6 outer circles -->
      <circle cx="0" cy="-60" r="8"/>
      <circle cx="52" cy="-30" r="8"/>
      <circle cx="52" cy="30" r="8"/>
      <circle cx="0" cy="60" r="8"/>
      <circle cx="-52" cy="30" r="8"/>
      <circle cx="-52" cy="-30" r="8"/>
      
      <!-- Center circle -->
      <circle cx="0" cy="0" r="8"/>
      
      <!-- Inner 6 circles -->
      <circle cx="0" cy="-30" r="8"/>
      <circle cx="26" cy="-15" r="8"/>
      <circle cx="26" cy="15" r="8"/>
      <circle cx="0" cy="30" r="8"/>
      <circle cx="-26" cy="15" r="8"/>
      <circle cx="-26" cy="-15" r="8"/>
    </g>
    
    <!-- Connecting lines forming the sacred geometry -->
    <g stroke="#ff6ec7" stroke-width="1.5" opacity="0.7" fill="none">
      <!-- Outer hexagon -->
      <path d="M 0,-60 L 52,-30 L 52,30 L 0,60 L -52,30 L -52,-30 Z"/>
      
      <!-- Inner hexagon -->
      <path d="M 0,-30 L 26,-15 L 26,15 L 0,30 L -26,15 L -26,-15 Z"/>
      
      <!-- Star pattern -->
      <line x1="0" y1="-60" x2="0" y2="60"/>
      <line x1="52" y1="-30" x2="-52" y2="30"/>
      <line x1="52" y1="30" x2="-52" y2="-30"/>
      
      <!-- Radial lines from center -->
      <line x1="0" y1="0" x2="0" y2="-60"/>
      <line x1="0" y1="0" x2="52" y2="-30"/>
      <line x1="0" y1="0" x2="52" y2="30"/>
      <line x1="0" y1="0" x2="0" y2="60"/>
      <line x1="0" y1="0" x2="-52" y2="30"/>
      <line x1="0" y1="0" x2="-52" y2="-30"/>
    </g>
    
    <!-- Additional sacred geometry lines -->
    <g stroke="#a855f7" stroke-width="1" opacity="0.6" fill="none">
      <!-- Connecting outer to inner circles -->
      <line x1="0" y1="-60" x2="0" y2="-30"/>
      <line x1="52" y1="-30" x2="26" y2="-15"/>
      <line x1="52" y1="30" x2="26" y2="15"/>
      <line x1="0" y1="60" x2="0" y2="30"/>
      <line x1="-52" y1="30" x2="-26" y2="15"/>
      <line x1="-52" y1="-30" x2="-26" y2="-15"/>
      
      <!-- Triangular patterns -->
      <path d="M 0,-30 L 26,-15 L -26,-15 Z"/>
      <path d="M 26,-15 L 26,15 L 0,30 Z"/>
      <path d="M 0,30 L -26,15 L -26,-15 Z"/>
    </g>
    
    <!-- Glowing center point -->
    <circle cx="0" cy="0" r="4" fill="#fbbf24" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="2" fill="#ffffff"/>
  </g>
  
  <!-- Text -->
  <g font-family="'Arial Black', sans-serif" font-weight="bold">
    <!-- Main text -->
    <text x="320" y="130" font-size="56" fill="url(#textGrad)" filter="url(#glow)">
      QUARTER2CRYPTO
    </text>
    
    <!-- Tagline -->
    <text x="320" y="180" font-size="20" fill="#a855f7" opacity="0.9" font-family="Arial, sans-serif" font-weight="normal" letter-spacing="4">
      BRIDGING WORLDS
    </text>
    
    <!-- .com -->
    <text x="710" y="135" font-size="28" fill="#6366f1" opacity="0.8" font-family="Arial, sans-serif">
      .com
    </text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="305" cy="150" r="3" fill="#ff6ec7" opacity="0.8" filter="url(#glow)"/>
  <circle cx="760" cy="150" r="3" fill="#a855f7" opacity="0.8" filter="url(#glow)"/>
</svg>